name: CI

# Trigger on push to any branch and all pull requests
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

# Cancel in-progress runs for the same workflow on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Code Quality Checks (Lint & Format)
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: 🔍 Run ESLint
        run: pnpm lint
      
      - name: 💅 Check Prettier formatting
        run: pnpm format:check

  # Job 2: Type Checking
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: 🔎 Run TypeScript type check
        run: pnpm typecheck

  # Job 3: Tests
  test:
    name: Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: 🧪 Run tests
        run: pnpm test
      
      - name: 📊 Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Job 4: Build Verification
  build:
    name: Build Packages
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: 🏗️ Build packages
        run: pnpm build
      
      - name: 📦 Check dist files
        run: |
          if [ ! -d "packages/react/dist" ]; then
            echo "❌ React package dist not generated"
            exit 1
          fi
          if [ ! -d "packages/tokens/dist" ]; then
            echo "❌ Tokens package dist not generated"
            exit 1
          fi
          echo "✅ All dist directories exist"

  # Job 5: All Checks Passed (Required status check)
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [quality, typecheck, test, build]
    if: always()
    
    steps:
      - name: ✅ Verify all jobs passed
        run: |
          if [ "${{ needs.quality.result }}" != "success" ]; then
            echo "❌ Code Quality checks failed"
            exit 1
          fi
          if [ "${{ needs.typecheck.result }}" != "success" ]; then
            echo "❌ Type checking failed"
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Tests failed"
            exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          echo "✅ All checks passed!"

